<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <!-- React + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
        <script type="text/babel">
            const { createRoot } = ReactDOM;
            const { useState } = React;
            const animals = ["Coniglio", "Anatra", "Topo"];
            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            const ReactApp = () => {

                const [anim, setAnim] = useState(animals);

                const addAnimal = () => setAnim([...anim, animalsChoices[Math.floor(Math.random() * animalsChoices.length)]]);

                return (
                    <>
                        <details>
                            <summary>Animali</summary>
                            <ul>
                                {
                                    anim.map((a, index) => <li key={index}>{a}</li>)
                                }
                            </ul>
                            <button onClick={addAnimal}> Aggiungi Animali</button>
                        </details>
                    </>
                )
            }

            const listaAnimaliEl = document.querySelector(".lista-animali")
            const root = createRoot(listaAnimaliEl);
            root.render(<ReactApp />)


        </script>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
